<div class="register-container">
  <div class="register-card">
    <h2>Créer un compte</h2>
    <p class="subtitle">Plateforme Quiz</p>

    <div class="form-row">
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" [(ngModel)]="prenom" placeholder="Jean" />
      </div>
      <div class="form-group">
        <label>Nom</label>
        <input type="text" [(ngModel)]="nom" placeholder="Dupont" />
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="votre@email.com" />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" />
    </div>

    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <input type="password" [(ngModel)]="confirmPassword" placeholder="••••••••" />
    </div>

    <div class="form-group">
      <label>Je suis</label>
      <div class="role-selector">
        <div class="role-card" [class.selected]="role === 'USER'"
             (click)="role = 'USER'">
          <span class="role-icone">👤</span>
          <span class="role-titre">Utilisateur</span>
          <span class="role-desc">Je veux jouer aux quiz</span>
        </div>
        <div class="role-card" [class.selected]="role === 'EVALUATEUR'"
             (click)="role = 'EVALUATEUR'">
          <span class="role-icone">📝</span>
          <span class="role-titre">Évaluateur</span>
          <span class="role-desc">Je veux créer des quiz</span>
        </div>
      </div>
    </div>

    @if (erreur) {
      <div class="erreur">{{ erreur }}</div>
    }
    @if (succes) {
      <div class="succes">{{ succes }}</div>
    }

    <button (click)="register()" [disabled]="chargement">
      {{ chargement ? 'Création...' : 'Créer le compte' }}
    </button>

    <p class="login-link">
      Déjà un compte ?
      <span (click)="allerLogin()">Se connecter</span>
    </p>
  </div>
</div>

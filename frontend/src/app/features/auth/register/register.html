<div class="register-container">
  <div class="register-card">
    <h2>Créer un compte</h2>
    <p class="subtitle">Plateforme Quiz</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email"
             placeholder="votre@email.com" />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password"
             placeholder="••••••••" />
    </div>

    <div class="form-group">
      <label>Confirmer le mot de passe</label>
      <input type="password" [(ngModel)]="confirmPassword"
             placeholder="••••••••" />
    </div>

    @if (erreur) {
      <div class="erreur">{{ erreur }}</div>
    }

    @if (succes) {
      <div class="succes">{{ succes }}</div>
    }

    <button (click)="register()" [disabled]="chargement">
      {{ chargement ? 'Création...' : 'Créer le compte' }}
    </button>

    <p class="login-link">
      Déjà un compte ?
      <span (click)="allerLogin()">Se connecter</span>
    </p>
  </div>
</div>
